name: Generate PDF from HTML

on:
  push:
    branches: [ main, master ] # 当代码推送到主分支时自动触发
  workflow_dispatch: # 允许你在网页上手动点击按钮触发

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer (无头浏览器)
        run: npm install puppeteer

      - name: Run PDF Generation Script
        run: |
          cat << 'EOF' > generate.js
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            // 启动虚拟浏览器
            const browser = await puppeteer.launch({ headless: "new" });
            const page = await browser.newPage();
            
            // 获取 HTML 文件的本地路径
            const filePath = `file://${path.join(__dirname, 'index.html')}`;
            console.log('正在打开页面:', filePath);
            
            // 等待网络空闲，确保 Tailwind CSS 的 CDN 完全加载
            await page.goto(filePath, { waitUntil: 'networkidle0', timeout: 60000 });
            
            // 额外等待 3 秒，确保所有字体和动态样式渲染完毕
            console.log('等待样式渲染...');
            await new Promise(r => setTimeout(r, 3000));
            
            // 导出 PDF（A4、横向、保留背景色、无边距）
            console.log('正在生成 PDF...');
            await page.pdf({
              path: 'qianshu-proposal.pdf',
              format: 'A4',
              landscape: true,
              printBackground: true,
              margin: { top: 0, right: 0, bottom: 0, left: 0 }
            });
            
            await browser.close();
            console.log('PDF 生成成功！');
          })();
          EOF
          node generate.js

      - name: Upload PDF Artifact (上传生成的 PDF)
        uses: actions/upload-artifact@v4
        with:
          name: Proposal-PDF
          path: qianshu-proposal.pdf
