name: Generate PDF from HTML

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run PDF Generation Script
        run: |
          cat << 'EOF' > generate.js
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            try {
              console.log('Starting browser...');
              const browser = await puppeteer.launch({ 
                headless: "new",
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              
              // 【魔法设置 1】：强制设置电脑端视口宽度，防止触发手机端拥挤排版，并提高清晰度
              await page.setViewport({ width: 1120, height: 1448, deviceScaleFactor: 2 });
              
              const filePath = `file://${path.join(__dirname, 'index.html')}`;
              console.log('Opening page:', filePath);
              
              await page.goto(filePath, { waitUntil: 'networkidle0', timeout: 60000 });
              
              console.log('Waiting for styles to render...');
              await new Promise(r => setTimeout(r, 3000));
              
              console.log('Generating Portrait PDF...');
              await page.pdf({
                path: 'qianshu-proposal.pdf',
                format: 'A4',
                landscape: false, // 【关键修改】：改为 false，变成竖屏
                printBackground: true,
                scale: 0.8, // 【魔法设置 2】：整体缩小到 80%，让内容完美适应较窄的竖屏宽度
                // 竖屏建议上下留出一点点白边（10mm），看起来更像正式的商业文档，左右保持无边距
                margin: { top: '10mm', right: '0', bottom: '10mm', left: '0' } 
              });
              
              await browser.close();
              console.log('PDF generated successfully!');
            } catch (error) {
              console.error('❌ Error generating PDF:', error);
              process.exit(1);
            }
          })();
          EOF
          node generate.js

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proposal-PDF
          path: qianshu-proposal.pdf
