name: Generate PDF from HTML

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run PDF Generation Script
        run: |
          cat << 'EOF' > generate.js
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            try {
              console.log('Starting browser...');
              const browser = await puppeteer.launch({ 
                headless: "new",
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              
              // 【修复 1】强制浏览器使用浅色模式 (Light Mode)，防止触发暗黑主题
              await page.emulateMediaFeatures([
                { name: 'prefers-color-scheme', value: 'light' }
              ]);
              
              const filePath = `file://${path.join(__dirname, 'index.html')}`;
              console.log('Opening page:', filePath);
              
              await page.goto(filePath, { waitUntil: 'networkidle0', timeout: 60000 });
              
              // 【修复 2】强制将网页 body 的背景色设置为纯白，防止透明背景在 PDF 中变成全黑
              await page.evaluate(() => {
                document.body.style.backgroundColor = '#ffffff';
              });
              
              console.log('Waiting for styles to render...');
              await new Promise(r => setTimeout(r, 3000));
              
              console.log('Generating PDF...');
              await page.pdf({
                path: 'qianshu-proposal.pdf',
                format: 'A4',
                landscape: true,
                printBackground: true,
                margin: { top: 0, right: 0, bottom: 0, left: 0 }
              });
              
              await browser.close();
              console.log('PDF generated successfully!');
            } catch (error) {
              console.error('❌ Error generating PDF:', error);
              process.exit(1);
            }
          })();
          EOF
          node generate.js

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proposal-PDF
          path: qianshu-proposal.pdf
